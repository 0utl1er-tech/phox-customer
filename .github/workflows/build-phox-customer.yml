name: Build and push phox-customer to Harbor

# 旧: GCP Artifact Registry (asia-northeast1-docker.pkg.dev/phoxtrot/phox)
# 新: 0UTL1ER 自前 Harbor (harbor.0utl1er.tech/phox/...) — GCP 移行に伴う書換。
#
# 認証情報 (HARBOR_USERNAME / HARBOR_PASSWORD) は Forgejo Actions repo secret。
# 中身は project-scoped robot `robot$phox+forgejo-ci`、push/pull のみ許可。
# 失効したら Harbor UI > Project: phox > Robot Accounts で再発行 → secret 上書き。

on:
  push:
    branches: [main]
  # 緊急時の手動 rebuild 用。たとえば:
  #   - Harbor robot のローテーション後に latest タグを取り直したい
  #   - 既に main に乗ってる SHA を再 build して docker layer を更新したい
  workflow_dispatch: {}

env:
  REGISTRY: harbor.0utl1er.tech
  IMAGE: phox/phox-customer

# main の連続 push を 1 ジョブに絞る (古い build を残しても意味がない)。
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # buildx は dind が共有してる /var/run/docker-shared/docker.sock 経由で
      # 走る (act_runner config の docker_host 指定)。
      - uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # buildx の registry-cache を Harbor 内 `phox/phox-customer/cache` に置く。
      # (旧 GCP 構成の頃から既に存在するリポジトリを再利用)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}/cache:buildx
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}/cache:buildx,mode=max
