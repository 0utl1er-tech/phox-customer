name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# 同じ branch の重複 push は前のを cancel して 1 並列に絞る。
# Forgejo runner の DinD は共有なので、複数 job が同じ host port を bind
# しようとすると `port is already allocated` で死ぬ (実証 2026-05)。
# concurrency group で 1 並列に絞れば host port 衝突は構造的に発生しない。
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Unit Tests (全ブランチで実行) ─────────────────────────────
  unit-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: phox-customer
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U root"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      # 異常終了した前回 job の orphan service container を掃除。
      # concurrency:cancel-in-progress でキャンセルされた job は
      # forgejo runner が service container を後始末しないことがあり、
      # 次の job が host port bind に失敗する原因になる。
      - name: Pre-flight orphan container cleanup
        run: |
          docker ps -aq --filter "publish=5432" | xargs -r docker rm -f
          docker ps -aq --filter "ancestor=postgres:16" | xargs -r docker rm -f

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install migrate CLI
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run migrations
        run: migrate -path db/migration -database "postgresql://root:secret@localhost:5432/phox-customer?sslmode=disable" up

      - name: Run unit tests
        run: go test -v -cover -count=1 ./...
