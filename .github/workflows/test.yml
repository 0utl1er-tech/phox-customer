name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# act_runner の `container.network: ""` 設定で job ごとに user-defined
# docker network が立ち上がり、その上で docker embedded DNS が走る。
# ので job container から `postgres:5432` で直接 service container に
# 届く。host port bind は不要 (= 並列 job の port 衝突も無い)。
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Unit Tests (全ブランチで実行) ─────────────────────────────
  unit-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: phox-customer
        options: >-
          --health-cmd "pg_isready -U root"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install migrate CLI
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      # job container と postgres service container は同じ user-defined network
      # に乗る (act_runner の network: "" 設定による) ので、service の name
      # `postgres` で 5432 に届く。job container の localhost ではない点に注意。
      - name: Run migrations
        run: migrate -path db/migration -database "postgresql://root:secret@postgres:5432/phox-customer?sslmode=disable" up

      - name: Run unit tests
        run: go test -v -cover -count=1 ./...
        env:
          DB_SOURCE: postgresql://root:secret@postgres:5432/phox-customer?sslmode=disable
