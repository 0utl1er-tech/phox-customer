name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# 同 branch の重複 push は前のを cancel して 1 並列に絞る (host port 衝突回避 +
# CPU 節約)。なお runner 側 config の `container.network: ""` 設定により
# job ごとに user-defined docker network が立つので、本来 host port bind は
# 不要だが port: ["5432:5432"] は GHA 互換の保険として残す (host からの
# debug アクセスや、将来 container 化されない job のためにも便利)。
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Unit Tests (全ブランチで実行) ─────────────────────────────
  unit-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: phox-customer
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U root"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      # 異常終了した前回 job の orphan service container を掃除。
      # concurrency:cancel-in-progress でキャンセルされた job が
      # service container を後始末しなかった場合の保険。
      - name: Pre-flight orphan container cleanup
        run: |
          docker ps -aq --filter "publish=5432" | xargs -r docker rm -f
          docker ps -aq --filter "ancestor=postgres:16" | xargs -r docker rm -f

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install migrate CLI
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      # job container と postgres service container は同じ user-defined network
      # に乗る (act_runner の network: "" 設定による) ので、service の name
      # `postgres` で 5432 に届く。job container の localhost ではない点に注意。
      - name: Run migrations
        run: migrate -path db/migration -database "postgresql://root:secret@postgres:5432/phox-customer?sslmode=disable" up

      - name: Run unit tests
        run: go test -v -cover -count=1 ./...
        env:
          DB_SOURCE: postgresql://root:secret@postgres:5432/phox-customer?sslmode=disable
