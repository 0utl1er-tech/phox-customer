syntax = "proto3";

package activity.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/0utl1er-tech/phox-customer/gen/pb/activity/v1;activityv1";

// ActivityService は顧客との各種やりとり (通話・メール送信・メール受信) を
// 同一のテーブル "Activity" に書き込む抽象化された RPC を提供する。
// 既存の CallService は Phase 12 で撤去され、このサービスに置き換わる。
service ActivityService {
  rpc ListActivitiesByCustomerID(ListActivitiesByCustomerIDRequest)
      returns (ListActivitiesByCustomerIDResponse);
  // Book 内の全顧客の Activity を横断して返す活動フィード。
  // 種別 / 担当者 / 期間でフィルタでき、occurred_at 降順 + offset ページング。
  rpc ListActivitiesByBookID(ListActivitiesByBookIDRequest)
      returns (ListActivitiesByBookIDResponse);
  // 担当者 × コール結果 (Status) のクロス集計。ロングフォーマットの
  // セル (user, status, count) を返し、ピボットは UI 側で行う。
  rpc GetCallStats(GetCallStatsRequest) returns (GetCallStatsResponse);
  // 担当者ごとのメール送信数と返信数。返信は「その顧客に最後に送信した
  // 担当者」への帰属で近似する (スレッド追跡は未実装)。
  rpc GetMailStats(GetMailStatsRequest) returns (GetMailStatsResponse);
  rpc CreateActivityCall(CreateActivityCallRequest)
      returns (CreateActivityCallResponse);
  rpc CreateActivityEmailSent(CreateActivityEmailSentRequest)
      returns (CreateActivityEmailSentResponse);
  rpc UpdateActivityStatus(UpdateActivityStatusRequest)
      returns (UpdateActivityStatusResponse);
  // 通話録音 (Zoom Phone) を再生するための短命 presigned GET URL を返す。
  // 録音実体は Ceph RGW (s3://phox-recordings/...) に保存されており、
  // ここで minio.PresignedGetObject を使って 5 分の URL を発行する。
  // 認可: activity が指す customer の book に user が permit を持つこと。
  rpc GetActivityRecording(GetActivityRecordingRequest)
      returns (GetActivityRecordingResponse);
}

enum ActivityType {
  ACTIVITY_TYPE_UNSPECIFIED = 0;
  ACTIVITY_TYPE_CALL = 1;
  ACTIVITY_TYPE_EMAIL_SENT = 2;
  ACTIVITY_TYPE_EMAIL_RECEIVED = 3;
}

message Activity {
  string id = 1;
  string customer_id = 2;
  optional string contact_id = 3;
  ActivityType type = 4;
  string user_id = 5;
  string user_name = 6;
  optional string status_id = 7;
  optional string status_name = 8;
  optional int32 status_priority = 9;
  optional bool status_effective = 10;
  optional bool status_ng = 11;
  optional string phone = 12;
  optional string mail_from = 13;
  optional string mail_to = 14;
  optional string mail_cc = 15;
  optional string subject = 16;
  optional string body = 17;
  optional string message_id = 18;
  google.protobuf.Timestamp occurred_at = 19;
  google.protobuf.Timestamp created_at = 20;
  // 通話録音 (Zoom Phone) のメタ。recording_url 自体は s3:// 形式の internal
  // path なので UI には返さず、has_recording=true なら別 RPC GetActivityRecording
  // で短命 presigned URL を取りに来る、という分離。duration_seconds は call
  // type の Activity でのみ意味を持つ。
  bool has_recording = 21;
  optional int32 duration_seconds = 22;
  // Book 横断フィード (ListActivitiesByBookID) でのみ埋まる。顧客詳細への
  // リンク表示用。ListActivitiesByCustomerID では未設定。
  optional string customer_name = 23;
  optional string customer_corporation = 24;
  // Phase 25: どのメールボックスで送受信したか (実メールボックス送信時のみ)。
  optional string mailbox_id = 25;
}

message ListActivitiesByCustomerIDRequest {
  string customer_id = 1 [(buf.validate.field).string.uuid = true];
  // 空配列なら全 type を返す
  repeated ActivityType types = 2;
}
message ListActivitiesByCustomerIDResponse {
  repeated Activity activities = 1;
}

message ListActivitiesByBookIDRequest {
  string book_id = 1 [(buf.validate.field).string.uuid = true];
  // 空配列なら全 type を返す
  repeated ActivityType types = 2;
  // 指定すると担当者で絞り込む (User.id = Keycloak sub)
  optional string user_id = 3;
  // 期間フィルタ。occurred_from <= occurred_at < occurred_to。
  // どちらも省略可 (省略側は無制限)。
  optional google.protobuf.Timestamp occurred_from = 4;
  optional google.protobuf.Timestamp occurred_to = 5;
  // 1 ページの件数。0 または未指定はサーバ既定値 (50)、上限 200。
  int32 limit = 6;
  int32 offset = 7;
}
message ListActivitiesByBookIDResponse {
  repeated Activity activities = 1;
  // フィルタ適用後の総件数 (ページネーション用)
  int64 total_count = 2;
}

message GetCallStatsRequest {
  string book_id = 1 [(buf.validate.field).string.uuid = true];
  optional google.protobuf.Timestamp occurred_from = 2;
  optional google.protobuf.Timestamp occurred_to = 3;
}
// クロス集計の 1 セル = (担当者, コール結果) の組み合わせ。
message CallStatsCell {
  string user_id = 1;
  string user_name = 2;
  // NULL (未設定) は Status 削除済み等のコール。UI では「未設定」列。
  optional string status_id = 3;
  optional string status_name = 4;
  optional int32 status_priority = 5;
  int64 count = 6;
  // Zoom 通話の合計通話秒数 (手動記録は duration が無いので含まれない)
  int64 total_duration_seconds = 7;
}
message GetCallStatsResponse {
  repeated CallStatsCell cells = 1;
}

message GetMailStatsRequest {
  string book_id = 1 [(buf.validate.field).string.uuid = true];
  optional google.protobuf.Timestamp occurred_from = 2;
  optional google.protobuf.Timestamp occurred_to = 3;
}
message MailStatsRow {
  // 帰属先不明の返信 (先行する送信メールが無い受信) は user_id = "" の
  // 行に集約される。
  string user_id = 1;
  string user_name = 2;
  int64 sent_count = 3;
  int64 reply_count = 4;
}
message GetMailStatsResponse {
  repeated MailStatsRow rows = 1;
}

message CreateActivityCallRequest {
  string customer_id = 1 [(buf.validate.field).string.uuid = true];
  string phone = 2 [(buf.validate.field).string.min_len = 1];
  string status_id = 3 [(buf.validate.field).string.uuid = true];
  optional string contact_id = 4;
  // 手動でコール履歴を追加する際の発生日時。未指定ならサーバ側で現在時刻を使う。
  optional google.protobuf.Timestamp occurred_at = 5;
}
message CreateActivityCallResponse {
  Activity activity = 1;
}

message CreateActivityEmailSentRequest {
  string customer_id = 1 [(buf.validate.field).string.uuid = true];
  string mail_to = 2 [(buf.validate.field).string.min_len = 3];
  optional string mail_cc = 3;
  string subject = 4 [(buf.validate.field).string.min_len = 1];
  string body = 5;
  optional string contact_id = 6;
  // Phase 25: 指定すると「Phox が所有する実メールボックス」として送信する
  // (From = そのアドレス、SMTP 認証もそのメールボックスの資格情報)。
  // 呼び出しユーザーにそのメールボックスの editor 以上の MailboxPermit が必要。
  // 省略時はレガシーのなりすまし送信 (トークンの email claim が From)。
  optional string mailbox_id = 7;
}
message CreateActivityEmailSentResponse {
  Activity activity = 1;
}

message UpdateActivityStatusRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string status_id = 2 [(buf.validate.field).string.uuid = true];
}
message UpdateActivityStatusResponse {
  Activity activity = 1;
}

message GetActivityRecordingRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message GetActivityRecordingResponse {
  // ブラウザの <audio src=...> に直接渡せる HTTPS URL (presigned GET)。
  string url = 1;
  // この URL の有効期限。UI 側で再生開始時に再取得すべきか判断するヒント。
  google.protobuf.Timestamp expires_at = 2;
}
