syntax = "proto3";

package user.v1;

import "buf/validate/validate.proto";
import "company/v1/company.proto";
import "google/api/annotations.proto";

option go_package = "github.com/0utl1er-tech/phox-customer/gen/pb/user/v1;userv1";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
  }
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (google.api.http) = {
      put: "/v1/users/me"
      body: "*"
    };
  }
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = {
      get: "/v1/users/{id}"
    };
  }
  rpc GetMe(GetMeRequest) returns (GetMeResponse) {
    option (google.api.http) = {
      get: "/v1/users/me"
    };
  }
  rpc AddCompanyUser(AddCompanyUserRequest) returns (AddCompanyUserResponse) {
    option (google.api.http) = {
      post: "/v1/company/users/by-uid"
      body: "*"
    };
  }
  rpc CreateCompanyUser(CreateCompanyUserRequest) returns (CreateCompanyUserResponse) {
    option (google.api.http) = {
      post: "/v1/company/users"
      body: "*"
    };
  }
  rpc ListCompanyUsers(ListCompanyUsersRequest) returns (ListCompanyUsersResponse) {
    option (google.api.http) = {
      get: "/v1/company/users"
    };
  }
  // ListKeycloakUsers returns every user in the configured Keycloak realm
  // plus a flag indicating whether a Phox DB User row already exists. Used
  // by the settings UI so admins can import Keycloak-registered users that
  // aren't yet linked to Phox. Caller must have role=owner.
  rpc ListKeycloakUsers(ListKeycloakUsersRequest) returns (ListKeycloakUsersResponse) {
    option (google.api.http) = {
      get: "/v1/keycloak/users"
    };
  }
}

message User {
  string id = 1;
  string name = 2 [(buf.validate.field).string.max_len = 128];
  company.v1.Company company = 3;
}

message CreateUserRequest {
  string name = 1 [(buf.validate.field).string.max_len = 128];
  string company_id = 2 [(buf.validate.field).string.uuid = true];
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  optional string name = 1 [(buf.validate.field).string.max_len = 128];
  optional string company_id = 2;
}

message UpdateUserResponse {
  User user = 1;
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

message GetMeRequest {}

message GetMeResponse {
  User user = 1;
}

message AddCompanyUserRequest {
  string user_id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string.max_len = 128];
}

message AddCompanyUserResponse {
  User user = 1;
}

message ListCompanyUsersRequest {}

message ListCompanyUsersResponse {
  repeated User users = 1;
}

message CreateCompanyUserRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 6];
  string name = 3 [(buf.validate.field).string.max_len = 128];
}

message CreateCompanyUserResponse {
  User user = 1;
}

message ListKeycloakUsersRequest {
  // Case-insensitive LIKE search on username or email; empty = return all.
  string search = 1 [(buf.validate.field).string.max_len = 128];
  // Upper bound on rows returned; defaults to 100, clamped to 500 server-side.
  int32 max = 2;
}

message ListKeycloakUsersResponse {
  repeated KeycloakUser users = 1;
}

message KeycloakUser {
  string id = 1;          // Keycloak user UUID (the JWT `sub`)
  string username = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  // True when a Phox DB User row already exists for this id.
  bool linked = 6;
}
